-   id: check-readme-updated
    name: Check README Updated
    description: Ensures nearest READMEs are staged with code changes; optional README reachability (args / README_ENFORCE_INTERLINK)
    entry: check-readme-updated.js
    language: node
    files: '.*'
    stages: [pre-commit]
    pass_filenames: false
    always_run: true 